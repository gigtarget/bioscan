name: Bootstrap BioScan Source

on:
  push:
    branches: [main]
    paths:
      - '.bootstrap/**'
      - '.github/workflows/bootstrap-source.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct Android source archive
        shell: bash
        run: |
          cat .bootstrap/part-* > /tmp/bioscan.b64
          base64 --decode /tmp/bioscan.b64 > /tmp/bioscan.tar.gz
          tar -xzf /tmp/bioscan.tar.gz -C .

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.9

      - name: Publish Android Studio project
        shell: bash
        run: |
          rm -rf .bootstrap
          rm -f .github/workflows/bootstrap-source.yml
          chmod +x gradlew
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish BioScan Android Studio project"
          git push

      - name: Build debug APK
        run: ./gradlew --no-daemon assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: BioScan-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
