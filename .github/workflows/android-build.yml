name: Build BioScan APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'gradle/**'
      - '*.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/android-build.yml'

permissions:
  contents: read

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licences
        shell: bash
        run: yes | sdkmanager --licenses > /dev/null || true

      - name: Install Android SDK 36
        shell: bash
        run: sdkmanager --install 'platforms;android-36' 'build-tools;36.0.0'

      - name: Set up Gradle 9.3.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'

      - name: Build debug APK
        shell: bash
        run: |
          set -o pipefail
          gradle --no-daemon :app:assembleDebug --stacktrace --warning-mode all 2>&1 | tee build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: BioScan-build-log
          path: build.log
          if-no-files-found: warn

      - name: Upload installable APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: BioScan-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
